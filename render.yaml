databases:
  - name: prd-gen-db
    plan: free
    databaseName: prd_gen_production
    user: prd_gen

services:
  - type: web
    name: prd-gen
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prd-gen-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: SOLID_QUEUE_IN_PUMA
        value: "1"
